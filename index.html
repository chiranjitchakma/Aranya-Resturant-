<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aranya Garden | Pure Veg Restaurant in Mysuru</title>
<meta name="description" content="Aranya Garden — 100% Pure Veg restaurant in Mysuru. South Indian breakfast, dosas, chats, fresh juice & meals. Order on WhatsApp, Zomato or Swiggy. Open until 10:30 PM.">
<meta name="theme-color" content="#2D5016">
<link rel="icon" href="https://raw.githubusercontent.com/chiranjitchakma/Aranya-Resturant-/main/Resturant%20logo.jpeg" type="image/jpeg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --cp:#2D5016;--cs:#D4831A;--ca:#C1440E;--cbg:#FBF5E6;--csf:#FFFFFF;
  --ct:#1A1A1A;--ctm:#6B6B6B;--cb:#E8DCC8;--cwa:#25D366;--czo:#E23744;--csw:#FC8019;
  --fd:'Cormorant Garamond',Georgia,serif;
  --fb:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --xs:.75rem;--sm:.875rem;--base:1rem;--lg:1.125rem;--xl:1.25rem;
  --xl2:1.5rem;--xl3:1.875rem;--xl4:2.25rem;--hero:clamp(2.5rem,6vw,4rem);
  --sc:0 4px 20px rgba(45,80,22,.08);--sn:0 2px 20px rgba(45,80,22,.12);
  --rc:14px;--rb:50px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--cbg);color:var(--ct);line-height:1.6;overflow-x:hidden}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:var(--fb);border:none;background:none}
ul{list-style:none}
section,#hero,#menu,#order-apps,#why-us,#reviews,#location,#contact{scroll-margin-top:72px}
.container{max-width:1200px;margin:0 auto;padding:0 1.25rem}
.section-title{font-family:var(--fd);font-size:var(--xl4);font-weight:700;color:var(--cp);text-align:center;margin-bottom:.5rem}
.section-divider{display:flex;align-items:center;justify-content:center;gap:.75rem;margin-bottom:2.5rem}
.section-divider::before,.section-divider::after{content:'';flex:1;max-width:120px;height:1px;background:var(--cb)}
.sdiv-icon{font-size:1.25rem;color:var(--cs)}
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.75rem;border-radius:var(--rb);font-family:var(--fb);font-size:var(--base);font-weight:600;cursor:pointer;transition:all .2s;border:2px solid transparent;white-space:nowrap}
.btn-wa{background:var(--cwa);color:#fff}.btn-wa:hover{background:#1db954;transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,211,102,.3)}
.btn-outline{background:transparent;border-color:rgba(255,255,255,.7);color:#fff}.btn-outline:hover{background:rgba(255,255,255,.1)}
.badge{display:inline-flex;align-items:center;gap:.25rem;padding:.2rem .65rem;border-radius:50px;font-size:var(--xs);font-weight:600}
.badge-green{background:rgba(45,80,22,.1);color:var(--cp)}
.badge-amber{background:rgba(212,131,26,.15);color:#9a5e0a}
.badge-red{background:rgba(193,68,14,.12);color:var(--ca)}
.fade-in{opacity:0;transform:translateY(24px);transition:opacity .55s,transform .55s}
.fade-in.visible{opacity:1;transform:translateY(0)}
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(120px);background:var(--cp);color:#fff;padding:.85rem 1.75rem;border-radius:var(--rb);font-size:var(--sm);font-weight:500;z-index:9999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);opacity:0;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.2)}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.toast-error{background:var(--ca)}

/* NAV */
#navbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(251,245,230,.96);backdrop-filter:blur(0);transition:box-shadow .3s,backdrop-filter .3s;border-bottom:1px solid transparent}
#navbar.scrolled{backdrop-filter:blur(10px);box-shadow:var(--sn);border-bottom-color:var(--cb)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem;max-width:1200px;margin:0 auto}
.nav-logo{display:flex;align-items:center;gap:.55rem;cursor:pointer}
.nav-logo-img{width:44px;height:44px;object-fit:contain;border-radius:6px;flex-shrink:0}
.nav-logo-text{display:flex;flex-direction:column;line-height:1.2}
.nav-logo-name{font-family:var(--fd);font-size:var(--xl);font-weight:700;color:var(--cp);letter-spacing:.03em}
.nav-logo-tag{font-size:.65rem;color:var(--ctm);letter-spacing:.07em;display:none}
@media(min-width:480px){.nav-logo-tag{display:block}}
.nav-links{display:none;gap:1.75rem}
@media(min-width:900px){.nav-links{display:flex;align-items:center}}
.nav-links a{font-size:var(--sm);font-weight:500;color:var(--ct);position:relative;padding-bottom:2px;cursor:pointer}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--cs);transition:width .2s}
.nav-links a:hover::after{width:100%}
.nav-right{display:flex;align-items:center;gap:.6rem}
.nav-wa-btn{display:flex;align-items:center;gap:.35rem;padding:.4rem .9rem;border-radius:var(--rb);background:var(--cwa);color:#fff;font-size:var(--xs);font-weight:600;transition:all .2s;cursor:pointer}
.nav-wa-btn:hover{background:#1db954}
.nav-wa-label{display:none}
@media(min-width:480px){.nav-wa-label{display:inline}}
@media(min-width:900px){.nav-wa-btn{padding:.5rem 1.1rem;font-size:var(--sm)}}
.hamburger{display:flex;flex-direction:column;justify-content:center;gap:5px;width:28px;height:28px;padding:0;background:none;border:none;cursor:pointer}
.hamburger span{display:block;width:100%;height:2px;background:var(--cp);border-radius:2px;transition:all .3s}
.hamburger.active span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.active span:nth-child(2){opacity:0}
.hamburger.active span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
@media(min-width:900px){.hamburger{display:none}}
#mobile-nav{position:fixed;inset:0;background:var(--cbg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
#mobile-nav.open{transform:translateX(0)}
#mobile-nav a{font-family:var(--fd);font-size:var(--xl3);font-weight:600;color:var(--cp);transition:color .2s;cursor:pointer}
#mobile-nav a:hover{color:var(--cs)}

/* HERO */
#hero{min-height:100vh;position:relative;display:flex;align-items:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,25,5,.65) 0%,rgba(10,25,5,.42) 50%,rgba(10,25,5,.78) 100%);z-index:1}
.hero-content{position:relative;z-index:2;max-width:800px;margin:0 auto;text-align:center;padding:7rem 1.25rem 4rem}
.hero-status{display:inline-flex;align-items:center;gap:.5rem;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(8px);padding:.4rem 1rem;border-radius:50px;color:#fff;font-size:var(--sm);font-weight:500;margin-bottom:1.75rem}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.open{background:#4ade80;box-shadow:0 0 8px #4ade80;animation:pdot 2s infinite}
.status-dot.closed{background:#f87171}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:.4}}
.hero-logo-wrap{margin-bottom:1.5rem;display:flex;justify-content:center}
.hero-logo-img{width:clamp(80px,18vw,130px);height:clamp(80px,18vw,130px);object-fit:contain;border-radius:16px;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);padding:10px;box-shadow:0 8px 32px rgba(0,0,0,.3),0 0 0 1px rgba(255,255,255,.15)}
.hero-title{font-family:var(--fd);font-size:var(--hero);font-weight:700;color:#fff;line-height:1.15;margin-bottom:1.25rem;text-shadow:0 2px 20px rgba(0,0,0,.4)}
.hero-title em{font-style:italic;color:#f6c87a}
.hero-subtitle{font-size:var(--lg);color:rgba(255,255,255,.88);margin-bottom:2.5rem;font-weight:300}
.hero-ctas{display:flex;flex-wrap:wrap;gap:1rem;justify-content:center;margin-bottom:2.5rem}
.hero-ctas .btn{font-size:var(--base);padding:.9rem 2rem}
.trust-badges{display:flex;flex-wrap:wrap;justify-content:center;gap:.75rem}
.trust-badge{display:inline-flex;align-items:center;gap:.35rem;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(6px);padding:.45rem 1rem;border-radius:50px;color:#fff;font-size:var(--sm);font-weight:500}

/* MENU */
#menu{padding:5rem 0}
.menu-tabs-wrap{overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;margin-bottom:2rem}
.menu-tabs-wrap::-webkit-scrollbar{display:none}
.menu-tabs{display:flex;gap:.6rem;padding:0 1.25rem;width:max-content;margin:0 auto}
.tab-btn{padding:.55rem 1.2rem;border-radius:50px;font-size:var(--sm);font-weight:600;border:2px solid var(--cp);background:transparent;color:var(--cp);transition:all .2s;white-space:nowrap;cursor:pointer}
.tab-btn.active,.tab-btn:hover{background:var(--cp);color:#fff}
.cat-section{display:none}.cat-section.active{display:block}
.timing-banner{display:flex;align-items:center;gap:.5rem;background:rgba(212,131,26,.1);border:1px solid rgba(212,131,26,.25);padding:.5rem 1rem;border-radius:8px;margin-bottom:1.5rem;font-size:var(--sm);color:#7a4a08;font-weight:500}
.menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
@media(min-width:900px){.menu-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1100px){.menu-grid{grid-template-columns:repeat(4,1fr)}}
.menu-card{background:var(--csf);border:1px solid var(--cb);border-radius:var(--rc);box-shadow:var(--sc);padding:1rem;position:relative;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s}
.menu-card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(45,80,22,.12)}
.card-badges{position:absolute;top:.75rem;right:.75rem;display:flex;flex-direction:column;gap:.3rem;align-items:flex-end}
.card-emoji{font-size:2.25rem;margin-bottom:.5rem}
.card-name{font-size:var(--base);font-weight:600;color:var(--ct);margin-bottom:.25rem;padding-right:3rem}
.card-desc{font-size:var(--xs);color:var(--ctm);margin-bottom:.75rem;flex:1}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.card-price{font-size:var(--xl);font-weight:700;color:var(--cp);font-family:var(--fd)}
.add-btn{padding:.4rem 1rem;background:var(--cs);color:#fff;border-radius:50px;font-size:var(--sm);font-weight:600;transition:all .2s;cursor:pointer}
.add-btn:hover{background:#b86f14}
.qty-ctrl{display:none;align-items:center;gap:.4rem}
.qty-ctrl.active{display:flex}
.qty-btn{width:28px;height:28px;border-radius:50%;background:var(--cp);color:#fff;font-size:1.1rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:background .2s;cursor:pointer}
.qty-btn:hover{background:#1e3b0f}
.qty-num{font-weight:700;font-size:var(--base);min-width:1.5ch;text-align:center}

/* CART FAB */
#cart-fab{position:fixed;bottom:1.75rem;right:1.75rem;background:var(--cp);color:#fff;width:58px;height:58px;border-radius:50%;font-size:1.4rem;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(45,80,22,.4);z-index:800;transition:transform .2s;cursor:pointer;border:none}
#cart-fab:hover{transform:scale(1.08)}
#cart-fab.pulse{animation:cpulse .45s ease}
@keyframes cpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
#cart-badge{position:absolute;top:-4px;right:-4px;background:var(--cs);color:#fff;border-radius:50%;width:22px;height:22px;font-size:.7rem;font-weight:700;display:none;align-items:center;justify-content:center;line-height:1}
#cart-badge.show{display:flex}

/* CART OVERLAY — full screen tap to close */
#cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:850;display:none;cursor:pointer}
#cart-overlay.show{display:block}

/* CART PANEL */
#cart-panel{position:fixed;top:0;right:0;bottom:0;width:min(420px,100vw);background:var(--cbg);z-index:900;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
#cart-panel.open{transform:translateX(0)}
.cart-hdr{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--cb);background:var(--csf);flex-shrink:0}
.cart-hdr h2{font-family:var(--fd);font-size:var(--xl2);font-weight:700;color:var(--cp)}
.cart-close-btn{width:36px;height:36px;border-radius:50%;background:var(--cb);color:var(--ct);font-size:1.1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0;transition:background .2s}
.cart-close-btn:hover{background:#d0c0a8}
.cart-body{flex:1;overflow-y:auto;padding:1.25rem 1.5rem;-webkit-overflow-scrolling:touch}
.cart-empty{text-align:center;padding:3rem 1rem;color:var(--ctm)}
.cart-empty p:first-child{font-size:2.5rem;margin-bottom:.5rem}
.cart-item{display:flex;align-items:center;justify-content:space-between;padding:.85rem 0;border-bottom:1px solid var(--cb);gap:.75rem}
.ci-name{font-weight:500;font-size:var(--sm);flex:1}
.ci-ctrl{display:flex;align-items:center;gap:.35rem}
.cqb{width:26px;height:26px;border-radius:50%;background:var(--cp);color:#fff;font-size:1rem;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}
.cqn{font-weight:700;min-width:1.2ch;text-align:center;font-size:var(--sm)}
.ci-del{color:var(--ca);font-size:1rem;padding:0 .25rem;cursor:pointer;border:none;background:none}
.ci-price{font-weight:700;color:var(--cp);font-size:var(--sm);white-space:nowrap}
.cart-ftr{padding:1rem 1.5rem 1.5rem;border-top:1px solid var(--cb);background:var(--csf);flex-shrink:0}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;padding:.75rem 0 1rem;font-weight:700;font-size:var(--lg)}
.cart-total-amt{color:var(--cp);font-family:var(--fd);font-size:var(--xl2)}
.fg{margin-bottom:.85rem}
.fg label{display:block;font-size:var(--xs);font-weight:600;color:var(--ctm);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.06em}
.fg input,.fg textarea{width:100%;padding:.65rem 1rem;border:1.5px solid var(--cb);border-radius:10px;font-family:var(--fb);font-size:var(--sm);background:var(--cbg);color:var(--ct);transition:border-color .2s;resize:none}
.fg input:focus,.fg textarea:focus{outline:none;border-color:var(--cp)}
.fg input.err,.fg textarea.err{border-color:var(--ca)}
.ferr{color:var(--ca);font-size:var(--xs);margin-top:.25rem;display:none}
.ferr.show{display:block}
.pay-info{display:flex;align-items:center;gap:.5rem;background:rgba(45,80,22,.06);border:1px solid rgba(45,80,22,.15);padding:.6rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:var(--sm);color:var(--cp);font-weight:500}
.place-btn{width:100%;padding:1rem;background:var(--cwa);color:#fff;border-radius:var(--rb);font-size:var(--base);font-weight:700;cursor:pointer;border:none;transition:background .2s}
.place-btn:hover{background:#1db954}

/* ORDER APPS */
#order-apps{background:var(--csf);padding:5rem 0;border-top:1px solid var(--cb);border-bottom:1px solid var(--cb)}
.app-btns{display:flex;flex-wrap:wrap;gap:1rem;justify-content:center;margin:2rem 0 1.5rem}
.app-btn{display:inline-flex;align-items:center;gap:.6rem;padding:1rem 2.25rem;border-radius:var(--rb);color:#fff;font-weight:700;font-size:var(--base);transition:all .2s;box-shadow:0 4px 14px rgba(0,0,0,.15);border:none;cursor:pointer}
.app-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.btn-zomato{background:var(--czo)}.btn-swiggy{background:var(--csw)}

/* WHY US */
#why-us{padding:5rem 0}
.why-grid{display:grid;gap:1.5rem;grid-template-columns:repeat(2,1fr)}
@media(min-width:768px){.why-grid{grid-template-columns:repeat(4,1fr)}}
.why-card{background:var(--csf);border:1px solid var(--cb);border-radius:var(--rc);padding:2rem 1.25rem;text-align:center;box-shadow:var(--sc)}
.why-icon{font-size:2.5rem;margin-bottom:1rem}
.why-h{font-family:var(--fd);font-size:var(--xl);font-weight:700;color:var(--cp);margin-bottom:.5rem}
.why-b{font-size:var(--sm);color:var(--ctm);line-height:1.6}

/* REVIEWS */
#reviews{background:var(--csf);padding:5rem 0;border-top:1px solid var(--cb)}
.rating-sum{text-align:center;margin-bottom:2.5rem}
.rating-big{font-family:var(--fd);font-size:4rem;font-weight:700;color:var(--cp);line-height:1}
.rating-stars{font-size:1.75rem;margin:.25rem 0}
.rating-count{color:var(--ctm);font-size:var(--sm)}
.reviews-grid{display:grid;gap:1.25rem;grid-template-columns:1fr}
@media(min-width:640px){.reviews-grid{grid-template-columns:repeat(3,1fr)}}
.review-card{background:var(--cbg);border:1px solid var(--cb);border-radius:var(--rc);padding:1.5rem;box-shadow:var(--sc)}
.review-stars{color:var(--cs);font-size:1rem;margin-bottom:.75rem}
.review-text{font-size:var(--sm);color:var(--ct);line-height:1.65;margin-bottom:1rem;font-style:italic}
.review-author{font-weight:600;font-size:var(--sm);color:var(--cp)}
.review-label{font-size:var(--xs);color:var(--ctm)}

/* LOCATION */
#location{padding:5rem 0}
.loc-grid{display:grid;gap:2rem;grid-template-columns:1fr}
@media(min-width:768px){.loc-grid{grid-template-columns:1fr 1fr;align-items:start}}
.map-wrap{border-radius:var(--rc);overflow:hidden;border:1px solid var(--cb);box-shadow:var(--sc)}
.open-map-btn{width:100%;padding:.85rem;background:var(--cp);color:#fff;font-size:var(--sm);font-weight:600;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:background .2s}
.open-map-btn:hover{background:#1e3b0f}
.hours-card{background:var(--csf);border:1px solid var(--cb);border-radius:var(--rc);padding:1.75rem;box-shadow:var(--sc)}
.hours-title{font-family:var(--fd);font-size:var(--xl2);font-weight:700;color:var(--cp);margin-bottom:1.25rem}
.hours-tbl{width:100%;border-collapse:collapse}
.hours-tbl tr{border-bottom:1px solid var(--cb)}
.hours-tbl tr:last-child{border-bottom:none}
.hours-tbl td{padding:.65rem 0;font-size:var(--sm)}
.hours-tbl td:first-child{font-weight:600;padding-right:1rem}
.hours-tbl td:last-child{color:var(--ctm)}
#hours-status{margin-top:1.25rem}

/* CONTACT */
#contact{background:var(--csf);padding:5rem 0;border-top:1px solid var(--cb)}
.ct-grid{display:grid;gap:2rem;grid-template-columns:1fr}
@media(min-width:768px){.ct-grid{grid-template-columns:1fr 1fr}}
.ct-info-item{display:flex;align-items:flex-start;gap:.75rem;margin-bottom:1.25rem}
.ct-info-icon{font-size:1.25rem;margin-top:.1rem}
.ct-info-label{font-size:var(--xs);font-weight:600;color:var(--ctm);text-transform:uppercase;letter-spacing:.06em}
.ct-info-val{font-size:var(--sm);color:var(--ct)}
.ct-form-card{background:var(--cbg);border:1px solid var(--cb);border-radius:var(--rc);padding:1.75rem}
.ct-form-title{font-family:var(--fd);font-size:var(--xl2);font-weight:700;color:var(--cp);margin-bottom:1.25rem}
.send-btn{width:100%;padding:.85rem;border-radius:var(--rb);background:var(--cwa);color:#fff;font-weight:700;font-size:var(--base);cursor:pointer;border:none;transition:background .2s}
.send-btn:hover{background:#1db954}

<!-- FOOTER -->
<footer>
<div class="container">
  <div class="footer-grid">
    <div>
      <div class="footer-logo-wrap">
        <img src="https://raw.githubusercontent.com/chiranjitchakma/Aranya-Resturant-/main/Resturant%20logo.jpeg" alt="Aranya Garden" class="footer-logo-img" width="56" height="56" loading="lazy">
        <div>
          <div class="footer-logo-name">Aranya Garden</div>
          <div class="footer-tagline">Pure Veg · Garden Fresh · Express Delivery</div>
        </div>
      </div>
      <span class="badge" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)">🌿 100% Pure Veg</span>
    </div>
    <div>
      <div class="footer-hdg">Quick Links</div>
      <ul class="footer-links">
        <li><a onclick="goTo('hero')">Home</a></li>

// ── CART ──
var cart = {};
function loadCart(){try{var s=localStorage.getItem(CART_KEY);if(s)cart=JSON.parse(s);}catch(e){cart={};}}
function saveCart(){try{localStorage.setItem(CART_KEY,JSON.stringify(cart));}catch(e){}}
function cartTotal(){return Object.values(cart).reduce(function(s,v){return s+v.p*v.q;},0);}
function cartCount(){return Object.values(cart).reduce(function(s,v){return s+v.q;},0);}
function updateBadge(){
  var b=document.getElementById('cart-badge'),n=cartCount();
  b.textContent=n;b.className=n>0?'show':'';
}
function addToCart(name,price){
  if(cart[name])cart[name].q++;else cart[name]={p:price,q:1};
  saveCart();updateBadge();syncCards();renderCart();
  var f=document.getElementById('cart-fab');
  f.classList.remove('pulse');void f.offsetWidth;f.classList.add('pulse');
  showToast('Added to cart 🛒');
}
function changeQty(name,d){
  if(!cart[name])return;
  cart[name].q+=d;
  if(cart[name].q<=0)delete cart[name];
  saveCart();updateBadge();syncCards();renderCart();
}
function renderCart(){
  var body=document.getElementById('cart-body'),ftr=document.getElementById('cart-ftr');
  var entries=Object.entries(cart);
  if(!entries.length){
    body.innerHTML='<div class="cart-empty"><p>🌿</p><p>Your cart is empty</p><small>Add items from the menu</small></div>';
    ftr.style.display='none';return;
  }
  ftr.style.display='block';
  document.getElementById('cart-total').textContent='₹'+cartTotal();
  body.innerHTML=entries.map(function(e){var name=e[0],v=e[1];return '<div class="cart-item"><div class="ci-name">'+esc(name)+'</div><div class="ci-ctrl"><button class="cqb" onclick="changeQty(\''+ea(name)+'\',-1)">−</button><span class="cqn">'+v.q+'</span><button class="cqb" onclick="changeQty(\''+ea(name)+'\',1)">+</button><button class="ci-del" onclick="changeQty(\''+ea(name)+'\',-'+v.q+')" aria-label="Remove">🗑</button></div><div class="ci-price">₹'+v.p*v.q+'</div></div>';}).join('');
}

// ── CART OPEN / CLOSE ──
function openCart(){
  renderCart();
  document.getElementById('cart-panel').classList.add('open');
  document.getElementById('cart-overlay').classList.add('show');
  document.getElementById('cart-panel').setAttribute('aria-hidden','false');
  document.body.style.overflow='hidden';
}
function closeCart(){
  document.getElementById('cart-panel').classList.remove('open');
  document.getElementById('cart-overlay').classList.remove('show');
  document.getElementById('cart-panel').setAttribute('aria-hidden','true');
  document.body.style.overflow='';
}

// ── MENU RENDER ──
function renderMenus(){
  Object.keys(MENU).forEach(function(cat){
    var g=document.getElementById('grid-'+cat);if(!g)return;
    g.innerHTML=MENU[cat].map(function(item){
      var q=cart[item.n]?cart[item.n].q:0;
      return '<article class="menu-card fade-in"><div class="card-badges">'+
        (item.best?'<span class="badge badge-amber">⭐ Best</span>':'')+
        (item.limited?'<span class="badge badge-red">📅 Mon/Wed/Fri</span>':'')+
        '</div><div class="card-emoji">'+item.e+'</div><div class="card-name">'+esc(item.n)+'</div><div class="card-desc">'+
        (item.d?esc(item.d):'')+'</div><div class="card-footer"><span class="card-price">₹'+item.p+'</span><div id="cc-'+cid(item.n)+'">'+ctrlHTML(item.n,item.p,q)+'</div></div></article>';
    }).join('');
  });
}
function ctrlHTML(name,price,q){
  if(q===0)return '<button class="add-btn" onclick="addToCart(\''+ea(name)+'\','+price+')">+ Add</button>';
  return '<div class="qty-ctrl active"><button class="qty-btn" onclick="changeQty(\''+ea(name)+'\',-1)">−</button><span class="qty-num">'+q+'</span><button class="qty-btn" onclick="changeQty(\''+ea(name)+'\',1)">+</button></div>';
}
function syncCards(){
  Object.keys(MENU).forEach(function(cat){
    MENU[cat].forEach(function(item){
      var el=document.getElementById('cc-'+cid(item.n));
      if(el)el.innerHTML=ctrlHTML(item.n,item.p,cart[item.n]?cart[item.n].q:0);
    });
  });
}
function switchTab(evt,cat){
  document.querySelectorAll('.cat-section').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('cat-'+cat).classList.add('active');
  evt.currentTarget.classList.add('active');
  initFadeIn();
}

// ── VALIDATE & ORDER ──
function validateForm(){
  var ok=true;
  var name=document.getElementById('cname').value.trim();
  var phone=document.getElementById('cphone').value.trim();
  var addr=document.getElementById('caddr').value.trim();
  function setE(id,eid,show){document.getElementById(id).classList.toggle('err',show);document.getElementById(eid).classList.toggle('show',show);if(show)ok=false;}
  setE('cname','err-name',name.length<2);
  setE('cphone','err-phone',!/^[6-9]\d{9}$/.test(phone));
  setE('caddr','err-addr',addr.length<10);
  return ok;
}
function placeOrder(){
  if(!validateForm())return;
  var name=document.getElementById('cname').value.trim();
  var phone=document.getElementById('cphone').value.trim();
  var addr=document.getElementById('caddr').value.trim();
  var items=Object.keys(cart).map(function(n){var v=cart[n];return '• '+n+' × '+v.q+' — ₹'+v.p*v.q;}).join('\n');
  var msg='🌿 *New Order — Aranya Garden*\n\n📋 *Order Details:*\n'+items+'\n\n💰 *Total: ₹'+cartTotal()+'*\n\n👤 *Customer:*\nName: '+name+'\nPhone: '+phone+'\nAddress: '+addr+'\n\n💳 Payment: Cash on Delivery\n⏱ Kindly confirm. Thank you!';
  window.open('https://wa.me/'+WA+'?text='+encodeURIComponent(msg),'_blank','noopener,noreferrer');
  showToast('Opening WhatsApp! 🎉');
  cart={};saveCart();updateBadge();syncCards();renderCart();closeCart();
}

function waOpen(){window.open('https://wa.me/'+WA+'?text='+encodeURIComponent("Hello Aranya Garden! I'd like to place an order."),'_blank','noopener,noreferrer');}

// ── OPEN STATUS ──
function getStatus(){
  var now=new Date();
  var ist=new Date(now.toLocaleString('en-US',{timeZone:'Asia/Kolkata'}));
  var m=ist.getHours()*60+ist.getMinutes();
  return m>=420&&m<1350;
}
function updateStatus(){
  var open=getStatus();
  var dot=document.getElementById('status-dot');
  var txt=document.getElementById('status-text');
  var hs=document.getElementById('hours-status');
  if(dot)dot.className='status-dot '+(open?'open':'closed');
  if(txt)txt.textContent=open?'Open Now · Closes 10:30 PM':'Closed · Opens 7:00 AM';
  if(hs)hs.innerHTML='<span class="badge '+(open?'badge-green':'badge-red')+'">'+( open?'🟢 Open Now · Closes 10:30 PM':'🔴 Closed · Opens 7:00 AM')+'</span>';
}

// ── NAVIGATION ──
function goTo(id){var el=document.getElementById(id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}
function mobileGoTo(id){closeMobileNav();setTimeout(function(){goTo(id);},320);}

// ── MOBILE NAV ──
function closeMobileNav(){
  var nav=document.getElementById('mobile-nav');
  var ham=document.getElementById('hamburger');
  nav.classList.remove('open');nav.setAttribute('aria-hidden','true');
  ham.classList.remove('active');ham.setAttribute('aria-expanded','false');
  var links=nav.querySelectorAll('a');links.forEach(function(l){l.setAttribute('tabindex','-1');});
}
function initMobileNav(){
  var ham=document.getElementById('hamburger');
  var nav=document.getElementById('mobile-nav');
  ham.addEventListener('click',function(){
    var open=nav.classList.toggle('open');
    ham.classList.toggle('active',open);
    ham.setAttribute('aria-expanded',open);
    nav.setAttribute('aria-hidden',!open);
    var links=nav.querySelectorAll('a,button');
    links.forEach(function(l){l.setAttribute('tabindex',open?'0':'-1');});
  });
}

// ── STICKY NAV ──
function initStickyNav(){
  window.addEventListener('scroll',function(){
    document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>80);
  },{passive:true});
}

// ── FADE IN ──
function initFadeIn(){
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});
  },{threshold:0.08});
  document.querySelectorAll('.fade-in:not(.visible)').forEach(function(el){obs.observe(el);});
}

// ── CONTACT WA ──
function sendContactWA(){
  var name=document.getElementById('ct-name').value.trim();
  var msg=document.getElementById('ct-msg').value.trim();
  if(!msg){showToast('Please type a message','error');return;}
  window.open('https://wa.me/'+WA+'?text='+encodeURIComponent('Hi Aranya Garden, '+msg+(name?' – '+name:'')),'_blank','noopener,noreferrer');
}

// ── TOAST ──
function showToast(msg,type){
  var t=document.getElementById('toast');t.textContent=msg;
  t.className=type==='error'?'show toast-error':'show';
  clearTimeout(window._tt);window._tt=setTimeout(function(){t.className='';},3000);
}

// ── HELPERS ──
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ea(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function cid(s){return s.replace(/[^a-zA-Z0-9]/g,'_');}

// ── KEYBOARD ──
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){closeCart();closeMobileNav();}
});

// ── INIT (runs after DOM is fully loaded) ──
document.addEventListener('DOMContentLoaded', function(){
  loadCart();
  renderMenus();
  updateStatus();setInterval(updateStatus,60000);
  initStickyNav();
  initMobileNav();
  initFadeIn();
  setTimeout(initFadeIn,500);
  updateBadge();

  // WA buttons
  ['nav-wa-btn','hero-wa-btn','mobile-wa-btn','apps-wa-btn'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();waOpen();});
  });

  // Swiggy placeholder
  var sw=document.getElementById('swiggy-btn');
  if(sw)sw.addEventListener('click',function(){showToast('Swiggy link coming soon!');});

  // Scroll to top button
  var sBtn=document.getElementById('scroll-top');
  if(sBtn){
    window.addEventListener('scroll',function(){
      sBtn.classList.toggle('show', window.scrollY>350);
    },{passive:true});
    sBtn.addEventListener('click',function(){
      window.scrollTo({top:0,behavior:'smooth'});
    });
  }

  // Back button closes cart (using popstate — NO pushState to avoid blank page)
  window.addEventListener('popstate',function(){
    var panel=document.getElementById('cart-panel');
    if(panel&&panel.classList.contains('open')){
      closeCart();
    }
  });
});
</script>
