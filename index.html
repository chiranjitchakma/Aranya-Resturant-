  <style>
    /* ── CSS CUSTOM PROPERTIES ── */
    :root {
      --color-primary:     #2D5016;
      --color-secondary:   #D4831A;
      --color-accent:      #C1440E;
      --color-bg:          #FBF5E6;
      --color-surface:     #FFFFFF;
      --color-text:        #1A1A1A;
      --color-text-muted:  #6B6B6B;
      --color-border:      #E8DCC8;
      --color-success:     #22863A;
      --color-whatsapp:    #25D366;
      --color-zomato:      #E23744;
      --color-swiggy:      #FC8019;
      --font-display:      'Cormorant Garamond', Georgia, serif;
      --font-body:         'DM Sans', system-ui, sans-serif;
      --text-xs:   0.75rem;
      --text-sm:   0.875rem;
      --text-base: 1rem;
      --text-lg:   1.125rem;
      --text-xl:   1.25rem;
      --text-2xl:  1.5rem;
      --text-3xl:  1.875rem;
      --text-4xl:  2.25rem;
      --text-hero: clamp(2.5rem, 6vw, 4rem);
      --shadow-card: 0 4px 20px rgba(45,80,22,0.08);
      --shadow-nav:  0 2px 20px rgba(45,80,22,0.12);
      --radius-card: 14px;
      --radius-btn:  50px;
    }

    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      overflow-x: hidden;
    }
    img { max-width: 100%; display: block; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: var(--font-body); border: none; background: none; }
    ul { list-style: none; }

    /* ── UTILITY ── */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 1.25rem; }
    .section-title {
      font-family: var(--font-display);
      font-size: var(--text-4xl);
      font-weight: 700;
      color: var(--color-primary);
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .section-divider {
      display: flex; align-items: center; justify-content: center;
      gap: 0.75rem; margin-bottom: 2.5rem;
    }
    .section-divider::before, .section-divider::after {
      content: ''; flex: 1; max-width: 120px;
      height: 1px; background: var(--color-border);
    }
    .section-divider-icon { font-size: 1.25rem; color: var(--color-secondary); }

    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: var(--radius-btn);
      font-family: var(--font-body);
      font-size: var(--text-base);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 2px solid transparent;
      white-space: nowrap;
    }
    .btn-whatsapp { background: var(--color-whatsapp); color: #fff; }
    .btn-whatsapp:hover { background: #1db954; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,211,102,0.3); }
    .btn-primary { background: var(--color-primary); color: #fff; }
    .btn-primary:hover { background: #1e3b0f; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(45,80,22,0.3); }
    .btn-outline { background: transparent; border-color: rgba(255,255,255,0.7); color: #fff; }
    .btn-outline:hover { background: rgba(255,255,255,0.1); }
    .btn-amber { background: var(--color-secondary); color: #fff; }
    .btn-amber:hover { background: #b86f14; }

    .badge {
      display: inline-flex; align-items: center; gap: 0.25rem;
      padding: 0.2rem 0.65rem;
      border-radius: 50px;
      font-size: var(--text-xs);
      font-weight: 600;
    }
    .badge-green { background: rgba(45,80,22,0.1); color: var(--color-primary); }
    .badge-amber { background: rgba(212,131,26,0.15); color: #9a5e0a; }
    .badge-red   { background: rgba(193,68,14,0.12); color: var(--color-accent); }

    /* ── FADE-IN ANIMATION ── */
    .fade-in {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--color-primary); color: #fff;
      padding: 0.85rem 1.75rem;
      border-radius: var(--radius-btn);
      font-size: var(--text-sm);
      font-weight: 500;
      z-index: 9999;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s;
      opacity: 0; pointer-events: none;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.toast-error { background: var(--color-accent); }

    /* ══════════════════════════════════════════
       SECTION 1 — NAVIGATION
    ══════════════════════════════════════════ */
    #navbar {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(251,245,230,0.92);
      backdrop-filter: blur(0px);
      transition: box-shadow 0.3s, backdrop-filter 0.3s;
      border-bottom: 1px solid transparent;
    }
    #navbar.scrolled {
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow-nav);
      border-bottom-color: var(--color-border);
    }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.85rem 1.25rem;
      max-width: 1200px; margin: 0 auto;
    }
    /* nav-logo styles moved to logo section below */

    .nav-links {
      display: none;
      gap: 1.75rem;
    }
    @media (min-width: 900px) {
      .nav-links { display: flex; align-items: center; }
    }
    .nav-links a {
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--color-text);
      position: relative;
      padding-bottom: 2px;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      width: 0; height: 2px;
      background: var(--color-secondary);
      transition: width 0.2s;
    }
    .nav-links a:hover::after { width: 100%; }

    .nav-right { display: flex; align-items: center; gap: 0.6rem; }
    .nav-wa-btn {
      display: flex; align-items: center; gap: 0.35rem;
      padding: 0.4rem 0.9rem;
      border-radius: var(--radius-btn);
      background: var(--color-whatsapp);
      color: #fff;
      font-size: var(--text-xs);
      font-weight: 600;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .nav-wa-btn:hover { background: #1db954; transform: translateY(-1px); }
    /* On small screens hide the label, show only icon */
    .nav-wa-label { display: none; }
    @media (min-width: 480px) { .nav-wa-label { display: inline; } }
    @media (min-width: 900px) {
      .nav-wa-btn { padding: 0.5rem 1.1rem; font-size: var(--text-sm); }
    }

    /* Hamburger */
    .hamburger {
      display: flex; flex-direction: column; justify-content: center;
      gap: 5px; width: 28px; height: 28px;
      padding: 0; background: none; border: none; cursor: pointer;
    }
    .hamburger span {
      display: block; width: 100%; height: 2px;
      background: var(--color-primary);
      border-radius: 2px;
      transition: all 0.3s;
    }
    .hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    @media (min-width: 900px) { .hamburger { display: none; } }

    /* Mobile Nav Overlay */
    #mobile-nav {
      position: fixed; inset: 0;
      background: var(--color-bg);
      z-index: 999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2rem;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    #mobile-nav.open { transform: translateX(0); }
    #mobile-nav a {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      font-weight: 600;
      color: var(--color-primary);
      transition: color 0.2s;
    }
    #mobile-nav a:hover { color: var(--color-secondary); }
    #mobile-nav .mobile-wa-btn {
      margin-top: 1rem;
      padding: 0.85rem 2rem;
      font-size: var(--text-base);
    }
